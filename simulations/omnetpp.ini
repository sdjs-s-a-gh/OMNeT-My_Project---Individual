[General]
description = Simple sim where two nodes communicate wirelessly.
network = ResourceNetwork
sim-time-limit = 60s

*.*.ipv4.arp.typename = "GlobalArp"

# Host A Configuration
*.hostA.numApps = 1
*.hostA*.app[0].typename = "TrafficGenerator"	# UdpEchoApp will send back packets; was UdpBasicApp
*.hostA*.app[0].destAddresses = "edgeServer" # "hostB"
*.hostA*.app[0].destPort = 5000 # HTTP Request
*.hostA*.app[0].messageLength = 1024B
*.hostA*.app[0].sendInterval = exponential(12ms)
*.hostA*.app[0].packetName = "TaskData"
*.hostA*.app[0].minRequiredCPUCycles = 200
*.hostA*.app[0].maxRequiredCPUCycles = 1000
*.hostA*.app[0].minDeadlineLatency = 1
*.hostA*.app[0].maxDeadlineLatency = 10

# Everything is fine until there is two of the same app communicating?
*.mdMobilePhone.numApps = 1
*.mdMobilePhone.app[0].typename = "TrafficGenerator"	# UdpEchoApp will send back packets; was UdpBasicApp
*.mdMobilePhone.app[0].destAddresses = "edgeServer" # "hostB"
*.mdMobilePhone.app[0].destPort = 5000 # HTTP Request
*.mdMobilePhone.app[0].messageLength = 1024B
*.mdMobilePhone.app[0].sendInterval = exponential(12ms)
*.mdMobilePhone.app[0].packetName = "TaskData"
*.mdMobilePhone.app[0].minRequiredCPUCycles = 100
*.mdMobilePhone.app[0].maxRequiredCPUCycles = 200
*.mdMobilePhone.app[0].minDeadlineLatency = 20
*.mdMobilePhone.app[0].maxDeadlineLatency = 30


